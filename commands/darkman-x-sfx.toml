description = "Toggle DMX sound clips for darkman-x (personal use, out-of-tree, never committed)."
prompt = "Set darkman-x sfx to {{args}} (default status). on/off/toggle/status. Clips live out-of-tree at ~/.config/darkman-x/sfx/ (or $DARKMANX_SFX_DIR) — never in this repo. When ON, playing a clip is your judgment call, not a fixed trigger table: use src/tools/darkman-x-sfx.js --list to see what exists, and node src/tools/darkman-x-sfx.js --quiet <clip-name> to play one when a moment earns it — a win, activation, something funny, hype, or just because. No fixed schedule, no clips held back, but every now and then beats every reply. Confirm the sfx state only — do not restate the whole skill."
