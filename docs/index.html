<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>darkman-x</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0b0b0d;
    color: #e8e8ea;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    box-sizing: border-box;
  }
  main { max-width: 640px; }
  h1 {
    font-size: clamp(2rem, 6vw, 3.5rem);
    letter-spacing: -0.02em;
    margin: 0 0 0.5rem;
  }
  p.tag { color: #a3a3ab; font-size: 1.1rem; margin: 0 0 2rem; }
  pre {
    background: #16161a;
    border: 1px solid #2a2a30;
    border-radius: 8px;
    padding: 1rem;
    overflow-x: auto;
    font-size: 0.9rem;
  }
  a { color: #ff3b5c; }
  .badge {
    display: inline-block;
    background: #ff3b5c;
    color: #0b0b0d;
    font-weight: 700;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<main>
  <span class="badge">DARKMAN-X</span>
  <h1>Cut filler. Keep the fix.</h1>
  <p class="tag">Makes AI coding agents talk short, hard, exact. ~65% fewer output tokens, measured — not invented.</p>
  <pre>curl -fsSL https://raw.githubusercontent.com/KcAnom/darkmanx/main/install.sh | bash</pre>
  <p><a href="https://github.com/KcAnom/darkmanx">Source on GitHub</a> · <a href="https://github.com/KcAnom/darkmanx/blob/main/docs/HONEST-NUMBERS.md">Honest numbers</a></p>
</main>
</body>
</html>
